  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

>\n<style>\n  *{box-sizing:border-box}\n  body{margin:0;background:#efe7d6;font-family:'Hanken Grotesk',system-ui,sans-serif;color:#3a322a}\n  ::-webkit-scrollbar{width:10px;height:10px}\n  ::-webkit-scrollbar-thumb{background:#d6c6a6;border-radius:6px;border:3px solid transparent;background-clip:padding-box}\n  ::-webkit-scrollbar-track{background:transparent}\n  input,button,textarea{font-family:inherit}\n  button{cursor:pointer}\n  @keyframes mIn{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}\n  @keyframes ovIn{from{opacity:0}to{opacity:1}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n<div style=\"display:flex;height:100vh;width:100%;overflow:hidden;background:#efe7d6\">\n\n  <!-- ===================== SIDEBAR ===================== -->\n  <aside style=\"width:262px;flex:none;background:linear-gradient(176deg,#e8d6b3,#e2cba4);border-right:1.5px solid #d2bd95;display:flex;flex-direction:column;box-shadow:1px 0 14px -6px rgba(90,60,20,.25);z-index:2\">\n    <div style=\"padding:22px 20px 16px\">\n      <div style=\"font:700 27px/.9 'Caveat',cursive;color:#b85c38\">Mi Libreta<\u002Fdiv>\n      <div style=\"font:700 9.5px 'Hanken Grotesk';letter-spacing:.22em;color:#a8915f;margin-top:4px\">UNIVERSITARIA<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"flex:1;overflow-y:auto;padding:4px 0 10px\">\n      <sc-for list=\"{{ ciclos }}\" as=\"ciclo\" hint-placeholder-count=\"2\">\n        <div style=\"margin:6px 0 12px\">\n          <div style=\"display:flex;align-items:center;gap:8px;padding:4px 18px 6px\">\n            <span style=\"font:700 9.5px 'Hanken Grotesk';letter-spacing:.16em;color:#9d8758;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ ciclo.nombre }}<\u002Fspan>\n            <button onclick=\"{{ ciclo.onAddCurso }}\" title=\"Agregar curso a este ciclo\" style=\"border:none;background:rgba(184,92,56,.14);color:#b85c38;width:20px;height:20px;border-radius:6px;font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0\">＋<\u002Fbutton>\n          <\u002Fdiv>\n          <sc-for list=\"{{ ciclo.cursos }}\" as=\"curso\" hint-placeholder-count=\"3\">\n            <div onclick=\"{{ curso.onSelect }}\" style=\"display:flex;align-items:center;gap:11px;padding:9px 12px;margin:2px 9px;border-radius:11px;cursor:pointer;background:{{ curso.rowBg }};box-shadow:{{ curso.rowShadow }};transition:background .12s\">\n              <span style=\"width:15px;height:15px;border-radius:5px;flex:none;background:{{ curso.color }};box-shadow:inset 0 0 0 1.5px rgba(0,0,0,.09),0 1px 2px rgba(0,0,0,.12)\"><\u002Fspan>\n              <span style=\"font:{{ curso.rowFont }};color:#3a322a;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ curso.nombre }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"padding:12px 14px;border-top:1.5px solid #d2bd95;display:flex;gap:8px\">\n      <button onclick=\"{{ onAddCiclo }}\" style=\"flex:1;border:1.5px solid #cdb78d;background:rgba(255,255,255,.4);color:#6e5d3c;font:600 12px 'Hanken Grotesk';padding:9px 10px;border-radius:10px\">＋ Ciclo<\u002Fbutton>\n      <button onclick=\"{{ onExport }}\" title=\"Descargar respaldo .json\" style=\"border:1.5px solid #cdb78d;background:rgba(255,255,255,.4);color:#6e5d3c;font:600 12px 'Hanken Grotesk';padding:9px 13px;border-radius:10px\">⤓ Respaldo<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- ===================== MAIN ===================== -->\n  <main style=\"flex:1;overflow-y:auto;position:relative\">\n\n    <!-- empty state (no course) -->\n    <sc-if value=\"{{ noCurso }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;color:#a8966f\">\n        <div style=\"font:600 64px/1 'Caveat',cursive;color:#cdb78d\">📒<\u002Fdiv>\n        <div style=\"font:600 26px/1.1 'Newsreader',serif;color:#6e5d3c;margin-top:8px\">Elige un curso<\u002Fdiv>\n        <div style=\"font:400 14px 'Hanken Grotesk';margin-top:8px;max-width:340px\">Selecciona un curso en la barra lateral, o crea uno nuevo con el botón ＋ junto a cada ciclo.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- course panel -->\n    <sc-if value=\"{{ hasCurso }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"max-width:960px;margin:0 auto;padding:34px 40px 60px\">\n\n        <!-- header -->\n        <div style=\"display:flex;align-items:flex-start;gap:16px\">\n          <div style=\"flex:1;min-width:0\">\n            <div style=\"font:600 11px 'Hanken Grotesk';letter-spacing:.1em;color:#a8966f;text-transform:uppercase\">{{ cicloNombre }}<\u002Fdiv>\n            <h1 style=\"font:600 38px/1.05 {{ titleFont }};color:#3a322a;margin:5px 0 0\">{{ cursoNombre }}<\u002Fh1>\n            <div style=\"width:58px;height:5px;border-radius:3px;margin:11px 0 9px;background:{{ cursoColor }}\"><\u002Fdiv>\n            <div style=\"font:500 13px 'Hanken Grotesk';color:#8a7d68\">{{ cursoProfesor }} · {{ totalFiles }} archivos<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:8px;flex:none;padding-top:4px\">\n            <button onclick=\"{{ onEditCurso }}\" style=\"border:1.5px solid #ddccab;background:#fbf6ec;color:#6e5d3c;font:600 12.5px 'Hanken Grotesk';padding:8px 13px;border-radius:10px\">✎ Editar<\u002Fbutton>\n            <button onclick=\"{{ onDeleteCurso }}\" title=\"Eliminar curso\" style=\"border:1.5px solid #e8c4b3;background:#fbf0ea;color:#b85c38;font:600 12.5px 'Hanken Grotesk';padding:8px 12px;border-radius:10px\">🗑<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- folder tabs -->\n        <div style=\"display:flex;align-items:flex-end;gap:4px;margin-top:26px;border-bottom:2.5px solid #dcc9a5;flex-wrap:wrap\">\n          <sc-for list=\"{{ folders }}\" as=\"folder\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ folder.onSelect }}\" style=\"border:none;background:{{ folder.bg }};color:{{ folder.color }};font:{{ folder.font }};padding:9px 15px;border-radius:10px 10px 0 0;border-top:3px solid {{ folder.top }};margin-bottom:-2.5px;display:flex;align-items:center;gap:8px\">\n              <span>{{ folder.nombre }}<\u002Fspan>\n              <span style=\"font:700 10px 'Hanken Grotesk';background:{{ folder.countBg }};color:{{ folder.countColor }};padding:1px 6px;border-radius:8px\">{{ folder.count }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n          <button onclick=\"{{ onAddFolder }}\" style=\"border:none;background:transparent;color:#b85c38;font:600 13px 'Hanken Grotesk';padding:9px 13px;border-radius:10px 10px 0 0;margin-bottom:-2.5px\">＋ carpeta<\u002Fbutton>\n        <\u002Fdiv>\n\n        <!-- folder toolbar -->\n        <div style=\"display:flex;align-items:center;gap:12px;margin:18px 0 14px\">\n          <div style=\"flex:1;min-width:0\">\n            <div style=\"font:600 18px 'Newsreader',serif;color:#3a322a\">{{ currentFolder }}<\u002Fdiv>\n            <div style=\"font:500 11.5px 'Hanken Grotesk';color:#a8966f\">{{ folderCount }} archivos en esta carpeta<\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ onRenameFolder }}\" style=\"border:1.5px solid #ddccab;background:#fbf6ec;color:#6e5d3c;font:600 12px 'Hanken Grotesk';padding:7px 12px;border-radius:9px\">Renombrar<\u002Fbutton>\n          <button onclick=\"{{ onDeleteFolder }}\" style=\"border:1.5px solid #e8c4b3;background:#fbf0ea;color:#b85c38;font:600 12px 'Hanken Grotesk';padding:7px 12px;border-radius:9px\">Eliminar<\u002Fbutton>\n        <\u002Fdiv>\n\n        <!-- dropzone -->\n        <div onclick=\"{{ onPick }}\" ondrop=\"{{ onDrop }}\" ondragover=\"{{ onDragOver }}\" ondragleave=\"{{ onDragLeave }}\" style=\"border:2px dashed {{ dropBorder }};background:{{ dropBg }};border-radius:14px;padding:22px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:background .12s,border-color .12s\">\n          <div style=\"width:46px;height:46px;border-radius:13px;flex:none;background:{{ accent }};display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;box-shadow:0 4px 12px -3px rgba(184,92,56,.5)\">⬆<\u002Fdiv>\n          <div style=\"flex:1\">\n            <div style=\"font:600 14.5px 'Hanken Grotesk';color:#3a322a\">Arrastra tus archivos aquí o haz clic para elegir<\u002Fdiv>\n            <div style=\"font:500 12px 'Hanken Grotesk';color:#a8966f;margin-top:2px\">PDF · Word · Excel · PowerPoint · imágenes · .py · .ipynb · lo que sea<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"font:600 13px 'Hanken Grotesk';color:#fff;background:{{ accent }};padding:9px 16px;border-radius:10px;flex:none\">Elegir archivos<\u002Fspan>\n        <\u002Fdiv>\n        <input type=\"file\" multiple=\"\" ref=\"{{ fileInputRef }}\" onchange=\"{{ onInputChange }}\" style=\"display:none\">\n\n        <!-- files -->\n        <sc-if value=\"{{ hasFiles }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;flex-direction:column;gap:8px;margin-top:16px\">\n            <sc-for list=\"{{ files }}\" as=\"file\" hint-placeholder-count=\"0\">\n              <div style=\"display:flex;align-items:center;gap:13px;background:#fbf6ec;border:1.5px solid #eaddc4;border-radius:12px;padding:11px 13px;box-shadow:0 1px 2px rgba(90,60,20,.05)\">\n                <span style=\"font:700 9.5px ui-monospace,Menlo,monospace;letter-spacing:.02em;padding:5px 7px;border-radius:6px;flex:none;color:#fff;min-width:46px;text-align:center;background:{{ file.badge }}\">{{ file.ext }}<\u002Fspan>\n                <div style=\"flex:1;min-width:0\">\n                  <div style=\"font:600 13.5px 'Hanken Grotesk';color:#3a322a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ file.nombre }}<\u002Fdiv>\n                  <div style=\"font:500 11px 'Hanken Grotesk';color:#a8966f;margin-top:1px\">{{ file.size }} · {{ file.date }}<\u002Fdiv>\n                <\u002Fdiv>\n                <button onclick=\"{{ file.onView }}\" style=\"border:1.5px solid #d8c8a8;background:#fff;color:#6e5d3c;font:600 12px 'Hanken Grotesk';padding:7px 13px;border-radius:9px;flex:none\">Ver<\u002Fbutton>\n                <button onclick=\"{{ file.onDownload }}\" title=\"Descargar\" style=\"border:1.5px solid #d8c8a8;background:#fff;color:#6e5d3c;font:600 14px 'Hanken Grotesk';padding:6px 11px;border-radius:9px;flex:none\">⤓<\u002Fbutton>\n                <button onclick=\"{{ file.onDelete }}\" title=\"Eliminar\" style=\"border:1.5px solid #e8c4b3;background:#fff;color:#b85c38;font:600 13px 'Hanken Grotesk';padding:6px 11px;border-radius:9px;flex:none\">✕<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noFiles }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:16px;text-align:center;padding:30px;border-radius:14px;background:rgba(255,255,255,.35)\">\n            <div style=\"font:600 21px 'Caveat',cursive;color:#bca77e\">Esta carpeta está vacía<\u002Fdiv>\n            <div style=\"font:500 12.5px 'Hanken Grotesk';color:#a8966f;margin-top:3px\">Sube tus apuntes, PDFs o código arrastrándolos arriba ☝<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- grade calculator -->\n        <sc-if value=\"{{ mostrarCalc }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:30px;background:#fbf6ec;border:1.5px solid #eaddc4;border-radius:16px;padding:20px 22px;box-shadow:0 4px 16px -10px rgba(90,60,20,.3)\">\n            <div style=\"display:flex;align-items:center;gap:10px\">\n              <div style=\"font:600 19px 'Newsreader',serif;color:#3a322a;flex:1\">Calculadora de notas<\u002Fdiv>\n              <span style=\"font:700 11px 'Hanken Grotesk';padding:4px 10px;border-radius:9px;background:{{ pesoChipBg }};color:{{ pesoChipColor }}\">Pesos: {{ pesoTotal }}%<\u002Fspan>\n              <button onclick=\"{{ onEditCurso }}\" title=\"Ajustar escala / nota de aprobación\" style=\"border:1.5px solid #ddccab;background:#fff;color:#6e5d3c;font:600 11px 'Hanken Grotesk';padding:5px 10px;border-radius:8px\">Escala 0–{{ escala }}<\u002Fbutton>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:10px;margin:14px 0 4px;font:700 10px 'Hanken Grotesk';letter-spacing:.04em;color:#b3a280;text-transform:uppercase\">\n              <div style=\"flex:1\">Criterio<\u002Fdiv>\n              <div style=\"width:74px;text-align:center\">Peso %<\u002Fdiv>\n              <div style=\"width:74px;text-align:center\">Nota<\u002Fdiv>\n              <div style=\"width:26px\"><\u002Fdiv>\n            <\u002Fdiv>\n\n            <sc-for list=\"{{ criterios }}\" as=\"crit\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;gap:10px;align-items:center;margin-bottom:7px\">\n                <input value=\"{{ crit.nombre }}\" onchange=\"{{ crit.onNombre }}\" style=\"flex:1;border:1.5px solid #e3d4b6;background:#fffdf8;border-radius:9px;padding:8px 11px;font:500 13px 'Hanken Grotesk';color:#3a322a\">\n                <input value=\"{{ crit.pesoVal }}\" onchange=\"{{ crit.onPeso }}\" type=\"number\" min=\"0\" style=\"width:74px;text-align:center;border:1.5px solid #e3d4b6;background:#fffdf8;border-radius:9px;padding:8px 6px;font:600 13px 'Hanken Grotesk';color:#3a322a\">\n                <input value=\"{{ crit.notaVal }}\" onchange=\"{{ crit.onNota }}\" type=\"number\" min=\"0\" placeholder=\"—\" style=\"width:74px;text-align:center;border:1.5px solid {{ crit.notaBorder }};background:#fffdf8;border-radius:9px;padding:8px 6px;font:600 13px 'Hanken Grotesk';color:#3a322a\">\n                <button onclick=\"{{ crit.onDelete }}\" title=\"Quitar criterio\" style=\"width:26px;height:26px;border:none;background:transparent;color:#c2a98a;font-size:15px;border-radius:7px;flex:none;padding:0\">✕<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n\n            <button onclick=\"{{ onAddCriterio }}\" style=\"border:1.5px dashed #d3bf97;background:transparent;color:#9a824f;font:600 12.5px 'Hanken Grotesk';padding:9px;border-radius:10px;width:100%;margin-top:4px\">＋ Agregar criterio<\u002Fbutton>\n\n            <div style=\"display:flex;align-items:center;gap:18px;margin-top:18px;padding-top:16px;border-top:1.5px solid #ecdfc5\">\n              <div style=\"text-align:center;flex:none\">\n                <div style=\"font:600 40px/1 'Newsreader',serif;color:{{ accent }}\">{{ promedio }}<\u002Fdiv>\n                <div style=\"font:600 9.5px 'Hanken Grotesk';letter-spacing:.08em;color:#a8966f;margin-top:2px\">PROMEDIO ACTUAL<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"flex:1\">\n                <div style=\"height:9px;background:#ece0c8;border-radius:5px;overflow:hidden\">\n                  <div style=\"width:{{ pct }}%;height:100%;background:{{ cursoColor }};border-radius:5px;transition:width .25s\"><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"margin-top:11px;font:600 13px 'Hanken Grotesk';padding:9px 13px;border-radius:10px;background:{{ necesitaBg }};color:{{ necesitaColor }}\">{{ necesitaMsg }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fmain>\n\n  <!-- ===================== PREVIEW MODAL ===================== -->\n  <sc-if value=\"{{ previewOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ onClosePreview }}\" style=\"position:fixed;inset:0;background:rgba(45,32,20,.5);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:50;padding:32px;animation:ovIn .15s ease\">\n      <div onclick=\"{{ stop }}\" style=\"background:#fbf6ec;border-radius:18px;width:860px;max-width:100%;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 30px 80px -20px rgba(40,25,10,.6);animation:mIn .2s ease\">\n        <div style=\"display:flex;align-items:center;gap:13px;padding:15px 18px;border-bottom:1.5px solid #eaddc4\">\n          <span style=\"font:700 9.5px ui-monospace,monospace;padding:5px 8px;border-radius:6px;color:#fff;background:{{ previewBadge }}\">{{ previewExt }}<\u002Fspan>\n          <div style=\"flex:1;font:600 15px 'Hanken Grotesk';color:#3a322a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ previewName }}<\u002Fdiv>\n          <button onclick=\"{{ onDownloadPreview }}\" style=\"border:1.5px solid #d8c8a8;background:#fff;color:#6e5d3c;font:600 12.5px 'Hanken Grotesk';padding:8px 14px;border-radius:10px\">⤓ Descargar<\u002Fbutton>\n          <button onclick=\"{{ onClosePreview }}\" style=\"border:none;background:#efe2cb;color:#6e5d3c;font-size:17px;width:34px;height:34px;border-radius:10px;padding:0\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"flex:1;overflow:auto;background:#f0e8d8;display:flex;align-items:center;justify-content:center;min-height:240px\">{{ previewBody }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== FORM MODAL ===================== -->\n  <sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ onCloseModal }}\" style=\"position:fixed;inset:0;background:rgba(45,32,20,.5);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:60;padding:32px;animation:ovIn .15s ease\">\n      <div onclick=\"{{ stop }}\" style=\"background:#fbf6ec;border-radius:18px;width:420px;max-width:100%;padding:24px;box-shadow:0 30px 80px -20px rgba(40,25,10,.6);animation:mIn .2s ease\">\n        <div style=\"font:600 22px 'Newsreader',serif;color:#3a322a;margin-bottom:18px\">{{ modalTitle }}<\u002Fdiv>\n\n        <label style=\"font:600 11px 'Hanken Grotesk';letter-spacing:.04em;color:#9a824f;text-transform:uppercase\">Nombre<\u002Flabel>\n        <input value=\"{{ modalNombre }}\" onchange=\"{{ onModalNombre }}\" placeholder=\"{{ modalNombrePH }}\" style=\"width:100%;border:1.5px solid #e3d4b6;background:#fffdf8;border-radius:11px;padding:11px 13px;font:500 14px 'Hanken Grotesk';color:#3a322a;margin:6px 0 4px\">\n\n        <sc-if value=\"{{ modalNeedsCourseFields }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <label style=\"display:block;font:600 11px 'Hanken Grotesk';letter-spacing:.04em;color:#9a824f;text-transform:uppercase;margin-top:14px\">Color del curso<\u002Flabel>\n            <div style=\"display:flex;flex-wrap:wrap;gap:9px;margin-top:9px\">\n              <sc-for list=\"{{ colorOptions }}\" as=\"c\" hint-placeholder-count=\"8\">\n                <button onclick=\"{{ c.onPick }}\" style=\"width:30px;height:30px;border-radius:9px;background:{{ c.hex }};border:3px solid {{ c.ring }};padding:0;box-shadow:0 1px 3px rgba(0,0,0,.18)\"><\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <label style=\"display:block;font:600 11px 'Hanken Grotesk';letter-spacing:.04em;color:#9a824f;text-transform:uppercase;margin-top:16px\">Profesor (opcional)<\u002Flabel>\n            <input value=\"{{ modalProfesor }}\" onchange=\"{{ onModalProfesor }}\" placeholder=\"Ej: Prof. Núñez\" style=\"width:100%;border:1.5px solid #e3d4b6;background:#fffdf8;border-radius:11px;padding:11px 13px;font:500 14px 'Hanken Grotesk';color:#3a322a;margin-top:6px\">\n\n            <div style=\"display:flex;gap:12px;margin-top:14px\">\n              <div style=\"flex:1\">\n                <label style=\"display:block;font:600 11px 'Hanken Grotesk';letter-spacing:.04em;color:#9a824f;text-transform:uppercase\">Nota máxima<\u002Flabel>\n                <input value=\"{{ modalEscala }}\" onchange=\"{{ onModalEscala }}\" type=\"number\" min=\"1\" style=\"width:100%;border:1.5px solid #e3d4b6;background:#fffdf8;border-radius:11px;padding:11px 13px;font:600 14px 'Hanken Grotesk';color:#3a322a;margin-top:6px\">\n              <\u002Fdiv>\n              <div style=\"flex:1\">\n                <label style=\"display:block;font:600 11px 'Hanken Grotesk';letter-spacing:.04em;color:#9a824f;text-transform:uppercase\">Aprueba con<\u002Flabel>\n                <input value=\"{{ modalAprob }}\" onchange=\"{{ onModalAprob }}\" type=\"number\" min=\"0\" style=\"width:100%;border:1.5px solid #e3d4b6;background:#fffdf8;border-radius:11px;padding:11px 13px;font:600 14px 'Hanken Grotesk';color:#3a322a;margin-top:6px\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"display:flex;gap:10px;margin-top:22px\">\n          <button onclick=\"{{ onCloseModal }}\" style=\"flex:1;border:1.5px solid #ddccab;background:#fff;color:#6e5d3c;font:600 13.5px 'Hanken Grotesk';padding:11px;border-radius:11px\">Cancelar<\u002Fbutton>\n          <button onclick=\"{{ onSubmitModal }}\" style=\"flex:1;border:none;background:{{ accent }};color:#fff;font:600 13.5px 'Hanken Grotesk';padding:11px;border-radius:11px\">Guardar<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:760},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#7e8b5b&quot;,&quot;options&quot;:[&quot;#b85c38&quot;,&quot;#c99a3a&quot;,&quot;#7e8b5b&quot;,&quot;#5f7d8a&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Estilo&quot;},&quot;titleStyle&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Serif (Newsreader)&quot;,&quot;options&quot;:[&quot;Serif (Newsreader)&quot;,&quot;Manuscrito (Caveat)&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Estilo&quot;},&quot;mostrarCalculadora&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Estilo&quot;}}\">\nconst PALETTE = ['#b85c38','#c99a3a','#7e8b5b','#a8584a','#ca8a3e','#5f7d8a','#8a5f73','#6e8c84'];\n\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.KEY = 'libreta_universitaria_v2';\n    this.fileInput = React.createRef();\n    this.state = { data:null, selCurso:null, selFolder:null, preview:null, modal:null, dragOver:false };\n  }\n\n  componentDidMount(){ this.loadData(); }\n\n  // ---------- storage ----------\n  loadData(){\n    let data=null;\n    try { data = JSON.parse(localStorage.getItem(this.KEY)); } catch(e){}\n    if(!data || !data.ciclos){ data = this.seed(); this.persist(data); }\n    const c0 = data.ciclos[0];\n    const cur0 = c0 && c0.cursos[0];\n    this.setState({ data, selCurso: cur0?cur0.id:null, selFolder: (cur0&&cur0.folders[0])?cur0.folders[0].id:null });\n  }\n  persist(data){ try{ localStorage.setItem(this.KEY, JSON.stringify(data)); }catch(e){} }\n  save(mut){\n    const data = JSON.parse(JSON.stringify(this.state.data));\n    mut(data); this.persist(data); this.setState({ data }); return data;\n  }\n  uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }\n\n  seed(){\n    const u=()=>this.uid();\n    const ck=(nombre,color,prof,folders,crits)=>({id:u(),nombre,color,profesor:prof,escala:20,aprobacion:11,\n      folders:folders.map(n=>({id:u(),nombre:n})),\n      criterios:crits.map(c=>({id:u(),nombre:c[0],peso:c[1],nota:c[2]})), files:[]});\n    return { ciclos:[\n      { id:u(), nombre:'Ciclo 3', cursos:[\n        ck('Cálculo II','#c99a3a','Prof. Núñez',['Apuntes','Exámenes','Laboratorios'],[['Parcial 1',20,14],['Parcial 2',20,16],['Tareas',20,18],['Examen final',40,null]]),\n        ck('Física III','#b85c38','Prof. Salas',['Apuntes','Problemas'],[['Prácticas',40,15],['Examen final',60,null]]),\n        ck('Algoritmos','#7e8b5b','Prof. Ríos',['Apuntes','Proyectos','Código'],[['Proyecto',50,17],['Examen',50,null]]),\n      ]},\n      { id:u(), nombre:'Ciclo 2', cursos:[\n        ck('Química General','#5f7d8a','Prof. Vega',['Apuntes','Laboratorios'],[['Labs',30,16],['Parcial',30,13],['Final',40,null]]),\n      ]},\n    ]};\n  }\n\n  // ---------- IndexedDB (file blobs) ----------\n  db(){\n    if(this._db) return this._db;\n    this._db = new Promise((res,rej)=>{\n      const r = indexedDB.open('libreta_files',1);\n      r.onupgradeneeded=()=>r.result.createObjectStore('files');\n      r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);\n    });\n    return this._db;\n  }\n  async idbPut(id,blob){ const db=await this.db(); return new Promise((res,rej)=>{ const t=db.transaction('files','readwrite'); t.objectStore('files').put(blob,id); t.oncomplete=()=>res(); t.onerror=()=>rej(t.error); }); }\n  async idbGet(id){ const db=await this.db(); return new Promise((res,rej)=>{ const t=db.transaction('files','readonly'); const q=t.objectStore('files').get(id); q.onsuccess=()=>res(q.result); q.onerror=()=>rej(q.error); }); }\n  async idbDel(id){ const db=await this.db(); return new Promise((res)=>{ const t=db.transaction('files','readwrite'); t.objectStore('files').delete(id); t.oncomplete=()=>res(); t.onerror=()=>res(); }); }\n\n  // ---------- lookups ----------\n  findCurso(data,id){ for(const ci of data.ciclos){ for(const cu of ci.cursos){ if(cu.id===id) return cu; } } return null; }\n  getCurso(data){ return this.findCurso(data||this.state.data, this.state.selCurso); }\n\n  selectCurso(cu){ this.setState({ selCurso:cu.id, selFolder: cu.folders[0]?cu.folders[0].id:null }); }\n  selectFolder(id){ this.setState({ selFolder:id }); }\n\n  // ---------- files ----------\n  async handleFiles(list){\n    const curso=this.getCurso(); if(!curso||!list.length) return;\n    const folderId=this.state.selFolder;\n    const metas=[];\n    for(const f of list){\n      const id=this.uid();\n      try{ await this.idbPut(id,f); }catch(e){ alert('No se pudo guardar '+f.name); continue; }\n      metas.push({ id, folderId, nombre:f.name, ext:(f.name.split('.').pop()||'').toLowerCase(), size:f.size, date:Date.now() });\n    }\n    if(metas.length) this.save(d=>{ const cu=this.findCurso(d,curso.id); cu.files=cu.files||[]; cu.files.push(...metas); });\n  }\n  async deleteFile(curso,file){\n    if(!confirm('¿Eliminar \"'+file.nombre+'\"? Esta acción no se puede deshacer.')) return;\n    await this.idbDel(file.id);\n    this.save(d=>{ const cu=this.findCurso(d,curso.id); cu.files=(cu.files||[]).filter(x=>x.id!==file.id); });\n  }\n  async downloadFile(file){\n    const blob=await this.idbGet(file.id); if(!blob) return alert('Archivo no encontrado.');\n    const url=URL.createObjectURL(blob); const a=document.createElement('a');\n    a.href=url; a.download=file.nombre; document.body.appendChild(a); a.click(); a.remove();\n    setTimeout(()=>URL.revokeObjectURL(url),1500);\n  }\n  async viewFile(file){\n    const blob=await this.idbGet(file.id); if(!blob) return alert('Archivo no encontrado.');\n    const ext=file.ext;\n    const imgs=['png','jpg','jpeg','gif','webp','bmp','svg','avif'];\n    const texts=['py','ipynb','md','txt','csv','json','js','ts','tsx','jsx','html','css','java','c','cpp','h','sql','r','m','sh','yml','yaml','xml'];\n    let kind='other', url=null, text=null;\n    if(imgs.includes(ext)){ kind='img'; url=URL.createObjectURL(blob); }\n    else if(ext==='pdf'){ kind='pdf'; url=URL.createObjectURL(blob); }\n    else if(texts.includes(ext)){ kind='text'; try{ text=await blob.text(); }catch(e){ text='(no se pudo leer el archivo)'; } }\n    this.setState({ preview:{ file, kind, url, text } });\n  }\n  closePreview(){ const p=this.state.preview; if(p&&p.url) URL.revokeObjectURL(p.url); this.setState({preview:null}); }\n\n  // ---------- folders ----------\n  deleteFolder(curso,folder){\n    if((curso.folders||[]).length<=1){ alert('El curso debe tener al menos una carpeta.'); return; }\n    if(!confirm('¿Eliminar la carpeta \"'+folder.nombre+'\" y todos sus archivos?')) return;\n    (curso.files||[]).filter(f=>f.folderId===folder.id).forEach(f=>this.idbDel(f.id));\n    const data=this.save(d=>{ const cu=this.findCurso(d,curso.id); cu.folders=cu.folders.filter(x=>x.id!==folder.id); cu.files=(cu.files||[]).filter(f=>f.folderId!==folder.id); });\n    if(this.state.selFolder===folder.id){ const cu=this.findCurso(data,curso.id); this.setState({selFolder:cu.folders[0].id}); }\n  }\n  deleteCurso(curso){\n    if(!confirm('¿Eliminar el curso \"'+curso.nombre+'\" y todos sus archivos?')) return;\n    (curso.files||[]).forEach(f=>this.idbDel(f.id));\n    this.save(d=>{ for(const ci of d.ciclos){ ci.cursos=ci.cursos.filter(x=>x.id!==curso.id); } });\n    if(this.state.selCurso===curso.id) this.setState({selCurso:null,selFolder:null});\n  }\n\n  // ---------- criterios ----------\n  addCriterio(curso){ this.save(d=>{ const cu=this.findCurso(d,curso.id); cu.criterios=cu.criterios||[]; cu.criterios.push({id:this.uid(),nombre:'Nuevo criterio',peso:0,nota:null}); }); }\n  updateCriterio(curso,id,key){ return e=>{ const v=e.target.value; this.save(d=>{ const cu=this.findCurso(d,curso.id); const cr=cu.criterios.find(x=>x.id===id); if(key==='nombre') cr.nombre=v; else cr[key]= v===''?null:Number(v); }); }; }\n  delCriterio(curso,id){ this.save(d=>{ const cu=this.findCurso(d,curso.id); cu.criterios=cu.criterios.filter(x=>x.id!==id); }); }\n\n  // ---------- modals ----------\n  openModal(m){ this.setState({modal:m}); }\n  closeModal(){ this.setState({modal:null}); }\n  setModalField(key){ return e=>{ const v=e.target.value; this.setState(s=>({modal:{...s.modal,[key]:v}})); }; }\n  setModalColor(c){ this.setState(s=>({modal:{...s.modal,color:c}})); }\n  submitModal(){\n    const m=this.state.modal; if(!m) return;\n    if(m.type==='ciclo'){ if(!(m.nombre||'').trim()) return; this.save(d=>{ d.ciclos.push({id:this.uid(),nombre:m.nombre.trim(),cursos:[]}); }); }\n    else if(m.type==='curso'){ if(!(m.nombre||'').trim()) return; const id=this.uid(); const fid=this.uid();\n      this.save(d=>{ const ci=d.ciclos.find(x=>x.id===m.cicloId); ci.cursos.push({id,nombre:m.nombre.trim(),color:m.color||'#b85c38',profesor:(m.profesor||'').trim(),escala:Number(m.escala)||20,aprobacion:Number(m.aprobacion)||11,folders:[{id:fid,nombre:'General'}],criterios:[],files:[]}); });\n      this.setState({selCurso:id,selFolder:fid}); }\n    else if(m.type==='editCurso'){ if(!(m.nombre||'').trim()) return; this.save(d=>{ const cu=this.findCurso(d,m.id); cu.nombre=m.nombre.trim(); cu.color=m.color; cu.profesor=(m.profesor||'').trim(); cu.escala=Number(m.escala)||20; cu.aprobacion=Number(m.aprobacion)||11; }); }\n    else if(m.type==='folder'){ if(!(m.nombre||'').trim()) return; this.save(d=>{ const cu=this.findCurso(d,m.cursoId); cu.folders.push({id:this.uid(),nombre:m.nombre.trim()}); }); }\n    else if(m.type==='editFolder'){ if(!(m.nombre||'').trim()) return; this.save(d=>{ const cu=this.findCurso(d,m.cursoId); const f=cu.folders.find(x=>x.id===m.id); f.nombre=m.nombre.trim(); }); }\n    this.closeModal();\n  }\n\n  exportJSON(){\n    const blob=new Blob([JSON.stringify(this.state.data,null,2)],{type:'application/json'});\n    const url=URL.createObjectURL(blob); const a=document.createElement('a');\n    a.href=url; a.download='mi-libreta.json'; a.click(); setTimeout(()=>URL.revokeObjectURL(url),1500);\n  }\n\n  // ---------- helpers ----------\n  badgeColor(ext){ const m={pdf:'#c0432e',doc:'#3a6ea5',docx:'#3a6ea5',xls:'#2f6f4f',xlsx:'#2f6f4f',csv:'#2f6f4f',ppt:'#d4612a',pptx:'#d4612a',py:'#2d5f8a',ipynb:'#d97b2b',md:'#8a7d68',txt:'#8a7d68',json:'#9a6a1f',zip:'#6e6049',rar:'#6e6049',png:'#7e8b5b',jpg:'#7e8b5b',jpeg:'#7e8b5b',gif:'#7e8b5b',webp:'#7e8b5b',svg:'#7e8b5b'}; return m[ext]||'#8a7d68'; }\n  fmtSize(b){ if(b==null) return ''; if(b<1024) return b+' B'; if(b<1048576) return Math.round(b/1024)+' KB'; return (b/1048576).toFixed(1)+' MB'; }\n  fmtDate(t){ const d=new Date(t); const m=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic']; return d.getDate()+' '+m[d.getMonth()]; }\n\n  renderVals(){\n    const accent = this.props.accent || '#b85c38';\n    const titleFont = (this.props.titleStyle==='Manuscrito (Caveat)') ? \"'Caveat',cursive\" : \"'Newsreader',serif\";\n    const mostrarCalc = this.props.mostrarCalculadora !== false;\n    const d = this.state.data;\n    if(!d) return { loaded:false, ciclos:[], hasCurso:false, noCurso:false, accent, titleFont, mostrarCalc:false, modalOpen:false, previewOpen:false, stop:e=>e.stopPropagation() };\n\n    const out = { accent, titleFont, mostrarCalc, stop:e=>e.stopPropagation(),\n      onAddCiclo:()=>this.openModal({type:'ciclo',nombre:''}),\n      onExport:()=>this.exportJSON() };\n\n    out.ciclos = d.ciclos.map(ci=>({\n      id:ci.id, nombre:ci.nombre,\n      onAddCurso:()=>this.openModal({type:'curso',cicloId:ci.id,nombre:'',color:'#c99a3a',profesor:'',escala:20,aprobacion:11}),\n      cursos: ci.cursos.map(cu=>{ const active=cu.id===this.state.selCurso; return {\n        id:cu.id, nombre:cu.nombre, color:cu.color,\n        active, onSelect:()=>this.selectCurso(cu),\n        rowBg: active?'#fbf6ec':'transparent',\n        rowShadow: active?'0 2px 8px -3px rgba(90,60,20,.3)':'none',\n        rowFont: active?\"700 13.5px 'Hanken Grotesk'\":\"500 13.5px 'Hanken Grotesk'\"\n      }; })\n    }));\n\n    const curso = this.getCurso();\n    out.hasCurso = !!curso;\n    out.noCurso = !curso;\n\n    // modal\n    const m=this.state.modal;\n    out.modalOpen=!!m;\n    if(m){\n      out.modalType=m.type;\n      out.modalTitle={ciclo:'Nuevo ciclo',curso:'Nuevo curso',editCurso:'Editar curso',folder:'Nueva carpeta',editFolder:'Renombrar carpeta'}[m.type];\n      out.modalNombrePH={ciclo:'Ej: Ciclo 4',curso:'Ej: Estadística',editCurso:'Nombre del curso',folder:'Ej: Tareas',editFolder:'Nombre de la carpeta'}[m.type];\n      out.modalNombre=m.nombre||'';\n      out.modalNeedsCourseFields=(m.type==='curso'||m.type==='editCurso');\n      out.modalProfesor=m.profesor||'';\n      out.modalEscala=m.escala==null?'':String(m.escala);\n      out.modalAprob=m.aprobacion==null?'':String(m.aprobacion);\n      out.colorOptions=PALETTE.map(c=>({hex:c, ring:c===m.color?'#3a322a':'rgba(0,0,0,.08)', onPick:()=>this.setModalColor(c)}));\n      out.onModalNombre=this.setModalField('nombre');\n      out.onModalProfesor=this.setModalField('profesor');\n      out.onModalEscala=this.setModalField('escala');\n      out.onModalAprob=this.setModalField('aprobacion');\n      out.onSubmitModal=()=>this.submitModal();\n      out.onCloseModal=()=>this.closeModal();\n    }\n\n    // preview\n    const p=this.state.preview;\n    out.previewOpen=!!p;\n    if(p){\n      out.previewName=p.file.nombre;\n      out.previewExt=(p.file.ext||'file').toUpperCase();\n      out.previewBadge=this.badgeColor(p.file.ext);\n      const h=React.createElement;\n      if(p.kind==='img') out.previewBody=h('img',{src:p.url,style:{maxWidth:'100%',maxHeight:'78vh',display:'block'}});\n      else if(p.kind==='pdf') out.previewBody=h('iframe',{src:p.url,style:{width:'100%',height:'78vh',border:'none',background:'#fff'}});\n      else if(p.kind==='text') out.previewBody=h('pre',{style:{margin:0,padding:'20px',width:'100%',height:'78vh',overflow:'auto',font:\"400 12.5px/1.6 ui-monospace,Menlo,monospace\",color:'#2e2620',background:'#fffdf8',whiteSpace:'pre-wrap',wordBreak:'break-word'}},p.text);\n      else out.previewBody=h('div',{style:{textAlign:'center',padding:'50px',color:'#8a7d68'}},\n        h('div',{style:{fontSize:'46px'}},'🗎'),\n        h('div',{style:{font:\"600 16px 'Hanken Grotesk'\",color:'#6e5d3c',marginTop:'10px'}},'No hay vista previa para este tipo de archivo'),\n        h('div',{style:{font:\"500 12.5px 'Hanken Grotesk'\",marginTop:'4px'}},'Descárgalo para abrirlo en tu computadora.'));\n      out.onClosePreview=()=>this.closePreview();\n      out.onDownloadPreview=()=>this.downloadFile(p.file);\n    }\n\n    if(curso){\n      const folderId=this.state.selFolder;\n      out.cursoNombre=curso.nombre; out.cursoColor=curso.color;\n      out.cursoProfesor=curso.profesor||'Sin profesor';\n      out.escala=curso.escala||20;\n      out.totalFiles=(curso.files||[]).length;\n      const ci=d.ciclos.find(c=>c.cursos.some(x=>x.id===curso.id));\n      out.cicloNombre=ci?ci.nombre:'';\n      out.onEditCurso=()=>this.openModal({type:'editCurso',id:curso.id,nombre:curso.nombre,color:curso.color,profesor:curso.profesor||'',escala:curso.escala,aprobacion:curso.aprobacion});\n      out.onDeleteCurso=()=>this.deleteCurso(curso);\n      out.onAddFolder=()=>this.openModal({type:'folder',cursoId:curso.id,nombre:''});\n\n      out.folders=curso.folders.map(f=>{ const active=f.id===folderId; return {\n        id:f.id, nombre:f.nombre, count:(curso.files||[]).filter(x=>x.folderId===f.id).length,\n        onSelect:()=>this.selectFolder(f.id),\n        bg: active?'#fbf6ec':'transparent',\n        color: active?'#3a322a':'#8a7d68',\n        font: active?\"700 13px 'Hanken Grotesk'\":\"600 13px 'Hanken Grotesk'\",\n        top: active?curso.color:'transparent',\n        countBg: active?curso.color:'#e3d4b6',\n        countColor: active?'#fff':'#8a7d68'\n      }; });\n      const af=curso.folders.find(f=>f.id===folderId);\n      out.currentFolder=af?af.nombre:'';\n      out.onRenameFolder=()=>af&&this.openModal({type:'editFolder',cursoId:curso.id,id:af.id,nombre:af.nombre});\n      out.onDeleteFolder=()=>af&&this.deleteFolder(curso,af);\n\n      const files=(curso.files||[]).filter(f=>f.folderId===folderId).sort((a,b)=>b.date-a.date);\n      out.folderCount=files.length;\n      out.hasFiles=files.length>0; out.noFiles=files.length===0;\n      out.files=files.map(f=>({ id:f.id, nombre:f.nombre, ext:(f.ext||'file').toUpperCase().slice(0,5),\n        badge:this.badgeColor(f.ext), size:this.fmtSize(f.size), date:this.fmtDate(f.date),\n        onView:()=>this.viewFile(f), onDownload:()=>this.downloadFile(f), onDelete:()=>this.deleteFile(curso,f) }));\n\n      // upload\n      out.fileInputRef=this.fileInput;\n      out.onPick=()=>this.fileInput.current&&this.fileInput.current.click();\n      out.onInputChange=e=>{ this.handleFiles(Array.from(e.target.files)); e.target.value=''; };\n      out.onDrop=e=>{ e.preventDefault(); this.setState({dragOver:false}); this.handleFiles(Array.from(e.dataTransfer.files)); };\n      out.onDragOver=e=>{ e.preventDefault(); if(!this.state.dragOver) this.setState({dragOver:true}); };\n      out.onDragLeave=e=>{ e.preventDefault(); this.setState({dragOver:false}); };\n      out.dropBg=this.state.dragOver?'#f3e4cb':'#fbf6ec';\n      out.dropBorder=this.state.dragOver?accent:'#d8c8a8';\n\n      // calculator\n      const crits=curso.criterios||[];\n      const esc=curso.escala||20, aprob=curso.aprobacion||11;\n      let acum=0, pesoGraded=0, pesoPend=0, pesoTotal=0;\n      crits.forEach(cr=>{ const pw=Number(cr.peso)||0; pesoTotal+=pw; if(cr.nota==null) pesoPend+=pw; else { acum+=(pw/100)*Number(cr.nota); pesoGraded+=pw; } });\n      out.criterios=crits.map(cr=>({ id:cr.id, nombre:cr.nombre, pesoVal:cr.peso==null?'':String(cr.peso), notaVal:cr.nota==null?'':String(cr.nota),\n        notaBorder: cr.nota==null?'#e9d2b6':'#cdbf97',\n        onNombre:this.updateCriterio(curso,cr.id,'nombre'), onPeso:this.updateCriterio(curso,cr.id,'peso'), onNota:this.updateCriterio(curso,cr.id,'nota'),\n        onDelete:()=>this.delCriterio(curso,cr.id) }));\n      out.onAddCriterio=()=>this.addCriterio(curso);\n      out.pesoTotal=Math.round(pesoTotal);\n      const pesoOk=Math.abs(pesoTotal-100)<0.5;\n      out.pesoChipBg=pesoOk?'#e6efd9':'#f5ddd0'; out.pesoChipColor=pesoOk?'#4a6b2a':'#a8432a';\n      const prom = pesoGraded>0 ? (acum/(pesoGraded/100)) : null;\n      out.promedio = prom==null?'—':prom.toFixed(1);\n      out.pct = prom==null?0:Math.max(0,Math.min(100, prom/esc*100));\n      let msg, tone;\n      if(crits.length===0){ msg='Agrega criterios de evaluación para calcular tu nota.'; tone='muted'; }\n      else if(pesoPend>0){ const need=(aprob-acum)/(pesoPend/100);\n        if(need<=0){ msg='✓ Ya aseguraste la aprobación, hagas lo que hagas en lo que falta'; tone='ok'; }\n        else if(need>esc){ msg='Con lo que falta no alcanzas para aprobar (necesitarías más de '+esc+')'; tone='warn'; }\n        else { msg='Necesitas '+need.toFixed(1)+' en lo que falta para aprobar (meta: '+aprob+'/'+esc+')'; tone='info'; }\n      } else { if(acum>=aprob){ msg='✓ Aprobado con '+acum.toFixed(1)+'/'+esc; tone='ok'; } else { msg='✗ No aprobado — '+acum.toFixed(1)+'/'+esc; tone='warn'; } }\n      out.necesitaMsg=msg;\n      out.necesitaBg = tone==='ok'?'#e6efd9':tone==='warn'?'#f5ddd0':tone==='muted'?'#f0e8d6':'#f6ecd6';\n      out.necesitaColor = tone==='ok'?'#4a6b2a':tone==='warn'?'#a8432a':tone==='muted'?'#9a824f':'#7c6a3a';\n    }\n\n    return out;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
